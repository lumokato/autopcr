name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: autopcr-production
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/lumokato/autopcr

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=autopcr-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=autopcr-${{ matrix.arch }}

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-architecture image
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long

      - name: Create manifest list
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        shell: bash
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Verify published image
        run: docker buildx imagetools inspect "${IMAGE_NAME}:sha-${GITHUB_SHA}"

  deploy:
    name: Deploy with Dokploy
    needs: publish
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger AutoPCR deployment
        env:
          DOKPLOY_DEPLOY_URL: ${{ secrets.DOKPLOY_AUTOPCR_DEPLOY_URL }}
        shell: bash
        run: |
          test -n "$DOKPLOY_DEPLOY_URL"
          payload=$(jq -n \
            --arg ref "refs/heads/main" \
            --arg sha "$GITHUB_SHA" \
            '{
              ref: $ref,
              after: $sha,
              head_commit: {
                id: $sha,
                message: "GHCR image published"
              },
              commits: [{
                id: $sha,
                modified: ["docker-compose.yaml"]
              }]
            }')
          curl \
            --fail-with-body \
            --retry 3 \
            --retry-all-errors \
            --header "Content-Type: application/json" \
            --header "X-GitHub-Event: push" \
            --data "$payload" \
            "$DOKPLOY_DEPLOY_URL"
